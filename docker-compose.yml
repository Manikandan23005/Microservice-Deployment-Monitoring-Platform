services:
  platform-backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    network_mode: "host"
    environment:
      - PORT=8000
      - AI_PROVIDER=groq
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=devops_nexus
      - DATABASE_URL=postgresql://postgres:postgres@localhost:5432/devops_nexus
    env_file:
      - .env
    volumes:
      - ./platform/backend/app:/app/app
      - ./platform/shared:/app/platform/shared
      - /home/satoru/.kube:/root/.kube
      - /home/satoru/.minikube:/home/satoru/.minikube
    depends_on:
      - postgres
      - redis

  platform-frontend:
    # --- Vite React App Server stub ---
    build:
      context: ./platform/frontend
      dockerfile: ../../applications/frontend/Dockerfile # Reuse node builder logic
    command: npm run dev -- --host --port 3000
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./platform/frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: devops-nexus-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=devops_nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devops-nexus-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
