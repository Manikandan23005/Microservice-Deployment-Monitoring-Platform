services:
  platform-backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - KUBERNETES_SERVICE_HOST=kubernetes.default.svc
      - AI_PROVIDER=groq
    env_file:
      - .env
    volumes:
      - ./platform/backend/app:/app/app
      - ./platform/shared:/app/platform/shared
    depends_on:
      - redis

  platform-frontend:
    # --- Vite React App Server stub ---
    build:
      context: ./platform/frontend
      dockerfile: ../../applications/frontend/Dockerfile # Reuse node builder logic
    command: npm run dev -- --host --port 3000
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./platform/frontend:/app
      - /app/node_modules

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
