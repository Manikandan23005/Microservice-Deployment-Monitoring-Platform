version: '3.8'

services:
  # TODO: Update with real service image builds once pipelines are complete
  gateway:
    build:
      context: ../applications/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth:8000
    depends_on:
      - auth

  auth:
    build:
      context: ../applications/auth
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:postgres@auth-db:5432/auth

  # Databases (stubs)
  auth-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth
    ports:
      - "5432:5432"
