apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: {{ .Release.Namespace | default "devops-nexus-prod" }}
  labels:
    app: traffic-generator
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
      - name: generator
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
