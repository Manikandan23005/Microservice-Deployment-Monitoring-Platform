global:
  environment: "prod"
serviceName: "gateway"
replicaCount: 2
containerPort: 8080
image:
  repository: "gateway"
  tag: "latest"
  pullPolicy: "Never"
service:
  type: "ClusterIP"
  port: 8080
resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"
hpa:
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 75
ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: "nginx"
  hosts:
    - host: "gateway.devopsnexus.prod"
      paths:
        - path: "/"
          pathType: "Prefix"