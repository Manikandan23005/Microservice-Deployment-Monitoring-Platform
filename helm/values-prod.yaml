# Production overrides
global:
  environment: "production"

gateway:
  replicaCount: 3
  image:
    pullPolicy: IfNotPresent
    tag: "1.0.0" # Lock down exact release tags in production
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: nexus.devopsnexus.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: devops-nexus-tls-prod
      hosts:
        - nexus.devopsnexus.io
