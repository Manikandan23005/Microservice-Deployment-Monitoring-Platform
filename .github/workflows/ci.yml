name: Microservices CI/CD & GitOps Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'applications/**'
      - 'helm/**'
      - 'kubernetes/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'applications/**'
      - 'helm/**'
      - 'kubernetes/**'

jobs:
  validate-helm:
    name: Validate Helm Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Lint Microservice Helm Charts
        run: |
          echo "=== Linting Root Umbrella Helm Chart ==="
          helm lint helm/
          
          for chart in helm/*; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "=== Linting $chart ==="
              helm lint "$chart"
            fi
          done

  build-microservices:
    name: Build & Test Microservice Containers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, frontend, gateway, notification, orders, payment, products, users]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Microservice Docker Build (${{ matrix.service }})
        run: |
          if [ -f "applications/${{ matrix.service }}/Dockerfile" ]; then
            echo "Building applications/${{ matrix.service }}..."
            docker build -t microservices/${{ matrix.service }}:test applications/${{ matrix.service }}
          elif [ -f "applications/Dockerfile.${{ matrix.service }}" ]; then
            echo "Building applications/Dockerfile.${{ matrix.service }}..."
            docker build -f applications/Dockerfile.${{ matrix.service }} -t microservices/${{ matrix.service }}:test applications
          else
            echo "No custom Dockerfile found for ${{ matrix.service }}, skipping container build."
          fi

  gitops-notification:
    name: GitOps ArgoCD Readiness Check
    needs: [validate-helm, build-microservices]
    runs-on: ubuntu-latest
    steps:
      - name: Notify GitOps Sync
        run: |
          echo "✅ All microservices and Helm charts validated successfully."
          echo "🚀 ArgoCD will automatically reconcile changes in the cluster within 3 minutes."
