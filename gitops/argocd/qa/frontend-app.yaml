apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-qa
  namespace: argocd
spec:
  project: default
  source:
    repoURL: '/home/satoru/Projects/Microservice-Deployment-Monitoring-Platform'
    targetRevision: HEAD
    path: helm/frontend
    helm:
      valueFiles:
        - values-qa.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: devops-nexus-qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true