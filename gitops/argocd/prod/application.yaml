apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-nexus-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Manikandan23005/Microservice-Deployment-Monitoring-Platform.git'
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: devops-nexus-prod
  syncPolicy:
    # Manual promotion checks are standard in production environments
    manualSyncLimit: 1
