apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-nexus-stage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Manikandan23005/Microservice-Deployment-Monitoring-Platform.git'
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values-stage.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: devops-nexus-stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
