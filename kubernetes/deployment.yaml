apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
  namespace: devops-nexus
  labels:
    app: gateway
spec:
  replicas: 1 # TODO: Parametrize replicas based on environment target
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      serviceAccountName: devops-nexus-sa
      containers:
      - name: gateway
        image: devopsnexus/gateway:latest # TODO: Replace with tag from CI run
        ports:
        - containerPort: 8080
        # TODO: Add liveness and readiness probe definitions
        # livenessProbe:
        #   httpGet:
        #     path: /healthz
        #     port: 8080
        #   initialDelaySeconds: 15
        #   periodSeconds: 20
        # TODO: Define CPU/Memory resources requirements
        # resources:
        #   requests:
        #     memory: "64Mi"
        #     cpu: "100m"
        #   limits:
        #     memory: "128Mi"
        #     cpu: "200m"
        envFrom:
        - configMapRef:
            name: devops-nexus-config
        - secretRef:
            name: devops-nexus-secrets
