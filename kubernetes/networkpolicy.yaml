apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-backend-ingress
  namespace: devops-nexus
spec:
  podSelector:
    matchLabels:
      app: auth # TODO: Target specific backend pods dynamically
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 8000
