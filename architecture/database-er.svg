<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%" style="background:#0f172a; font-family: system-ui, -apple-system, sans-serif;">
  <text x="450" y="40" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">PostgreSQL Entity Relationship Schema</text>
  
  <rect x="50" y="80" width="240" height="180" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="110" fill="#93c5fd" font-size="15" font-weight="bold" text-anchor="middle">TABLE: users</text>
  <text x="70" y="140" fill="#ffffff" font-size="12">• id (PK, UUID)</text>
  <text x="70" y="165" fill="#ffffff" font-size="12">• username (VARCHAR)</text>
  <text x="70" y="190" fill="#ffffff" font-size="12">• role (VARCHAR)</text>
  <text x="70" y="215" fill="#ffffff" font-size="12">• hashed_password</text>
  <text x="70" y="240" fill="#ffffff" font-size="12">• created_at (TIMESTAMP)</text>

  <rect x="330" y="80" width="240" height="180" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="110" fill="#6ee7b7" font-size="15" font-weight="bold" text-anchor="middle">TABLE: audit_logs</text>
  <text x="350" y="140" fill="#ffffff" font-size="12">• id (PK, Integer)</text>
  <text x="350" y="165" fill="#ffffff" font-size="12">• username (FK)</text>
  <text x="350" y="190" fill="#ffffff" font-size="12">• action (VARCHAR)</text>
  <text x="350" y="215" fill="#ffffff" font-size="12">• target_resource</text>
  <text x="350" y="240" fill="#ffffff" font-size="12">• timestamp (TIMESTAMP)</text>

  <rect x="610" y="80" width="240" height="180" rx="10" fill="#1e293b" stroke="#818cf8" stroke-width="2"/>
  <text x="730" y="110" fill="#c7d2fe" font-size="15" font-weight="bold" text-anchor="middle">TABLE: clusters</text>
  <text x="630" y="140" fill="#ffffff" font-size="12">• id (PK, UUID)</text>
  <text x="630" y="165" fill="#ffffff" font-size="12">• name (VARCHAR)</text>
  <text x="630" y="190" fill="#ffffff" font-size="12">• api_server_url</text>
  <text x="630" y="215" fill="#ffffff" font-size="12">• environment</text>
  <text x="630" y="240" fill="#ffffff" font-size="12">• status (Healthy/Error)</text>
</svg>