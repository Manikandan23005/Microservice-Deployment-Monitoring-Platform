<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="100%" height="100%" style="background:#0f172a; font-family: system-ui, -apple-system, sans-serif;">
  <text x="450" y="40" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">DevOps Nexus Backend Architecture</text>
  
  <!-- Router Layer -->
  <rect x="50" y="80" width="800" height="75" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="450" y="110" fill="#a5b4fc" font-size="15" font-weight="bold" text-anchor="middle">FastAPI REST Routers (/api/v1)</text>
  <text x="450" y="135" fill="#c7d2fe" font-size="12" text-anchor="middle">/auth • /k8s • /deployments • /pods • /gitops • /monitoring • /ai • /clusters • /admin</text>

  <!-- Middleware / Core -->
  <rect x="50" y="180" width="800" height="65" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="205" fill="#93c5fd" font-size="14" font-weight="bold" text-anchor="middle">Core Services &amp; Guardrail Engines</text>
  <text x="450" y="228" fill="#cbd5e1" font-size="12" text-anchor="middle">ScopeEngine • AuthzEngine (RBAC) • AuditService • ProcessingTimeMiddleware</text>

  <!-- Business Logic Services -->
  <rect x="50" y="270" width="380" height="120" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="240" y="300" fill="#6ee7b7" font-size="14" font-weight="bold" text-anchor="middle">Platform Domain Services</text>
  <text x="240" y="325" fill="#d1fae5" font-size="12" text-anchor="middle">• DeploymentService &amp; PodService</text>
  <text x="240" y="345" fill="#d1fae5" font-size="12" text-anchor="middle">• MonitoringService &amp; GitOpsService</text>
  <text x="240" y="365" fill="#d1fae5" font-size="12" text-anchor="middle">• ClusterRegistryService</text>

  <!-- AI Services -->
  <rect x="470" y="270" width="360" height="120" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="650" y="300" fill="#c7d2fe" font-size="14" font-weight="bold" text-anchor="middle">Nexus AI Reasoning Services</text>
  <text x="650" y="325" fill="#e0e7ff" font-size="12" text-anchor="middle">• AICopilotEngine</text>
  <text x="650" y="345" fill="#e0e7ff" font-size="12" text-anchor="middle">• AIAgentPipeline (Synthesizer &amp; Planner)</text>
  <text x="650" y="365" fill="#e0e7ff" font-size="12" text-anchor="middle">• RemediationPlanner &amp; Verification</text>

  <!-- External Infrastructure Clients -->
  <rect x="50" y="420" width="800" height="85" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="450" y="450" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Infrastructure Clients Layer</text>
  <text x="450" y="475" fill="#cbd5e1" font-size="12" text-anchor="middle">Kubernetes API Client • ArgoCD Client • Prometheus Client • Loki Client • PostgreSQL (SQLAlchemy)</text>
</svg>