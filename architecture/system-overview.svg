<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%" style="background:#0f172a; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="grad-ui" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="grad-backend" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="grad-ai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="grad-gitops" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="grad-obs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="grad-k8s" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#818cf8"/>
    </marker>
  </defs>

  <text x="500" y="45" fill="#ffffff" font-size="22" font-weight="bold" text-anchor="middle">DevOps Nexus v1.0 — Overall System Architecture</text>
  
  <!-- Frontend -->
  <rect x="250" y="80" width="500" height="80" rx="12" fill="url(#grad-ui)" stroke="#818cf8" stroke-width="2"/>
  <text x="500" y="115" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">DevOps Nexus Frontend Platform</text>
  <text x="500" y="140" fill="#cbd5e1" font-size="13" text-anchor="middle">React 18 • TypeScript • Enterprise Design System • Spotlight (Ctrl+K) • AI Drawer (Ctrl+Shift+K)</text>

  <!-- Arrow Frontend -> Backend -->
  <path d="M 500 160 L 500 210" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="515" y="190" fill="#94a3b8" font-size="11" font-family="monospace">REST API / JWT Auth</text>

  <!-- Backend -->
  <rect x="250" y="215" width="500" height="90" rx="12" fill="url(#grad-backend)" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="250" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">DevOps Nexus Backend Platform</text>
  <text x="500" y="275" fill="#93c5fd" font-size="13" text-anchor="middle">FastAPI Async • Python 3.10+ • ScopeEngine • AuthzEngine • Audit Logger</text>

  <!-- Arrows Backend to Subsystems -->
  <path d="M 330 305 L 200 375" stroke="#818cf8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 500 305 L 500 375" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 670 305 L 800 375" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Subsystems -->
  <!-- Nexus AI -->
  <rect x="50" y="380" width="300" height="110" rx="12" fill="url(#grad-ai)" stroke="#6366f1" stroke-width="2"/>
  <text x="200" y="415" fill="#a5b4fc" font-size="15" font-weight="bold" text-anchor="middle">Nexus AI Reasoning Engine</text>
  <text x="200" y="440" fill="#e0e7ff" font-size="12" text-anchor="middle">• Grounded Prompt Synthesis</text>
  <text x="200" y="460" fill="#e0e7ff" font-size="12" text-anchor="middle">• Remediation Execution Plans</text>
  <text x="200" y="480" fill="#e0e7ff" font-size="12" text-anchor="middle">• Post-Execution Verification</text>

  <!-- GitOps Control Plane -->
  <rect x="375" y="380" width="250" height="110" rx="12" fill="url(#grad-gitops)" stroke="#10b981" stroke-width="2"/>
  <text x="500" y="415" fill="#6ee7b7" font-size="15" font-weight="bold" text-anchor="middle">GitOps Control Plane</text>
  <text x="500" y="440" fill="#d1fae5" font-size="12" text-anchor="middle">• ArgoCD Application Sync</text>
  <text x="500" y="460" fill="#d1fae5" font-size="12" text-anchor="middle">• GitOps Ownership Resolution</text>
  <text x="500" y="480" fill="#d1fae5" font-size="12" text-anchor="middle">• Multi-Cluster Registry</text>

  <!-- Observability Platform -->
  <rect x="650" y="380" width="300" height="110" rx="12" fill="url(#grad-obs)" stroke="#f59e0b" stroke-width="2"/>
  <text x="800" y="415" fill="#fcd34d" font-size="15" font-weight="bold" text-anchor="middle">Observability Platform</text>
  <text x="800" y="440" fill="#fef3c7" font-size="12" text-anchor="middle">• Prometheus 8-Metric Telemetry</text>
  <text x="800" y="460" fill="#fef3c7" font-size="12" text-anchor="middle">• Loki LogQL Streams + K8s Fallback</text>
  <text x="800" y="480" fill="#fef3c7" font-size="12" text-anchor="middle">• AlertManager Firing Alerts</text>

  <!-- Target K8s Cluster -->
  <path d="M 200 490 L 350 540" stroke="#94a3b8" stroke-width="1.5"/>
  <path d="M 500 490 L 500 540" stroke="#94a3b8" stroke-width="1.5"/>
  <path d="M 800 490 L 650 540" stroke="#94a3b8" stroke-width="1.5"/>
  
  <rect x="150" y="545" width="700" height="75" rx="12" fill="url(#grad-k8s)" stroke="#94a3b8" stroke-width="2"/>
  <text x="500" y="575" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">Target Kubernetes Infrastructure</text>
  <text x="500" y="600" fill="#cbd5e1" font-size="13" text-anchor="middle">Minikube • EKS • GKE • AKS • K3s • Microservice Deployments &amp; Pods</text>
</svg>