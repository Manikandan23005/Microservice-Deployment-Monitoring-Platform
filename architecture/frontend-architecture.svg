<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%" style="background:#0f172a; font-family: system-ui, -apple-system, sans-serif;">
  <text x="450" y="40" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">DevOps Nexus Frontend Architecture</text>
  
  <!-- App Entry -->
  <rect x="250" y="70" width="400" height="55" rx="10" fill="#4f46e5" stroke="#818cf8" stroke-width="2"/>
  <text x="450" y="103" fill="#ffffff" font-size="15" font-weight="bold" text-anchor="middle">App.tsx &amp; React Router</text>

  <!-- Context Providers -->
  <rect x="150" y="150" width="600" height="55" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="450" y="183" fill="#c7d2fe" font-size="14" font-weight="bold" text-anchor="middle">AuthContext &amp; ScopeContext (Cluster / Namespace Scope)</text>

  <!-- Layout Component -->
  <rect x="100" y="230" width="700" height="60" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="265" fill="#93c5fd" font-size="14" font-weight="bold" text-anchor="middle">DashboardLayout (Sidebar, Navigation, CommandPalette Ctrl+K)</text>

  <!-- Pages -->
  <rect x="50" y="320" width="480" height="150" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="290" y="350" fill="#6ee7b7" font-size="14" font-weight="bold" text-anchor="middle">Platform Views &amp; Workspaces</text>
  <text x="290" y="375" fill="#d1fae5" font-size="12" text-anchor="middle">• Deployments &amp; Pods (EnterpriseTable)</text>
  <text x="290" y="395" fill="#d1fae5" font-size="12" text-anchor="middle">• Metrics (8 SVG Area Charts)</text>
  <text x="290" y="415" fill="#d1fae5" font-size="12" text-anchor="middle">• Logs (Loki + K8s Fallback Log Viewer)</text>
  <text x="290" y="435" fill="#d1fae5" font-size="12" text-anchor="middle">• Clusters, Namespaces, Alerts, Audit Logs</text>

  <!-- AIOps Drawer -->
  <rect x="550" y="320" width="300" height="150" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="700" y="350" fill="#a5b4fc" font-size="14" font-weight="bold" text-anchor="middle">AIOps Copilot Drawer</text>
  <text x="700" y="375" fill="#e0e7ff" font-size="12" text-anchor="middle">Ctrl + Shift + K</text>
  <text x="700" y="400" fill="#e0e7ff" font-size="12" text-anchor="middle">• CodeBlock Copy Button</text>
  <text x="700" y="420" fill="#e0e7ff" font-size="12" text-anchor="middle">• Evidence Quality Badges</text>
  <text x="700" y="440" fill="#e0e7ff" font-size="12" text-anchor="middle">• Interactive Step Timeline</text>
</svg>