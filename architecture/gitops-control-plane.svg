<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%" style="background:#0f172a; font-family: system-ui, -apple-system, sans-serif;">
  <text x="450" y="40" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle">GitOps Control Plane &amp; Multi-Cluster Registry</text>
  
  <rect x="50" y="90" width="380" height="160" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="240" y="125" fill="#6ee7b7" font-size="16" font-weight="bold" text-anchor="middle">🟢 GitOps Managed Workload</text>
  <text x="240" y="155" fill="#d1fae5" font-size="13" text-anchor="middle">• Label: app.kubernetes.io/instance</text>
  <text x="240" y="180" fill="#d1fae5" font-size="13" text-anchor="middle">• ArgoCD Automated Application Sync</text>
  <text x="240" y="205" fill="#d1fae5" font-size="13" text-anchor="middle">• Permanent Delete Guardrail Protected</text>

  <rect x="470" y="90" width="380" height="160" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="660" y="125" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">⚪ Kubernetes Managed Workload</text>
  <text x="660" y="155" fill="#cbd5e1" font-size="13" text-anchor="middle">• Native K8s Deployment Manifest</text>
  <text x="660" y="180" fill="#cbd5e1" font-size="13" text-anchor="middle">• Direct Scale &amp; Restart Operations</text>
  <text x="660" y="205" fill="#cbd5e1" font-size="13" text-anchor="middle">• Standard K8s Lifecycle Rules</text>

  <rect x="50" y="290" width="800" height="150" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="450" y="325" fill="#a5b4fc" font-size="16" font-weight="bold" text-anchor="middle">Multi-Cluster Registry Engine</text>
  <text x="450" y="355" fill="#c7d2fe" font-size="13" text-anchor="middle">• Multi-Context Cluster Switching (minikube, eks-prod, gke-dev)</text>
